<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Account Auto Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #3b5998;
        }
        button {
            padding: 10px 20px;
            background-color: #3b5998;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2d4373;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Facebook Auto Account Generator</h1>
    <button onclick="generateAccount()">Generate Account</button>
    <div id="result"></div>
</div>

<script>
    async function generateAccount() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Generating... Please wait.";
        
        try {
            const response = await fetch("/fb_otp_auto_create");
            const data = await response.json();
            
            if (data.status === false) {
                resultDiv.innerHTML = `Error: ${data.error}`;
            } else {
                resultDiv.innerHTML = `Account created successfully!<br>Email: ${data.email}`;
            }
        } catch (error) {
            resultDiv.innerHTML = "Error: Could not connect to the server.";
        }
    }
</script>

</body>
</html>
